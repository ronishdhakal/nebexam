name: nebexam

# ─────────────────────────────────────────────────────────────────────────────
#  Blue-Green deployment
#  - nginx is always running and routes to the ACTIVE color
#  - Only one color (blue OR green) is live at a time
#  - deploy.sh handles starting the new color, switching nginx, stopping old
#
#  Bring up initial stack:  docker compose --profile blue up -d
#  Manual color switch:      bash deploy.sh
# ─────────────────────────────────────────────────────────────────────────────

x-backend: &backend-base
  build:
    context: ./nebexam-backend
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/api/schema/"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 20s

x-frontend: &frontend-base
  build:
    context: ./nebexam-frontend
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  env_file: .env
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3000/"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:

  # ── Nginx (always running) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "8000:8000"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: always
    depends_on:
      - backend-blue
      - frontend-blue

  # ── Blue stack ─────────────────────────────────────────────────────────────
  backend-blue:
    <<: *backend-base
    container_name: nebexam-backend-blue
    profiles: ["blue"]
    volumes:
      - cache-blue:/app/.cache
      - uploads:/app/uploads

  frontend-blue:
    <<: *frontend-base
    container_name: nebexam-frontend-blue
    profiles: ["blue"]

  # ── Green stack ────────────────────────────────────────────────────────────
  backend-green:
    <<: *backend-base
    container_name: nebexam-backend-green
    profiles: ["green"]
    volumes:
      - cache-green:/app/.cache
      - uploads:/app/uploads

  frontend-green:
    <<: *frontend-base
    container_name: nebexam-frontend-green
    profiles: ["green"]

volumes:
  uploads:      # shared media uploads (only used without R2)
  cache-blue:
  cache-green:
