[databases]
nebexam_db = host=127.0.0.1 port=5432 dbname=nebexam_db

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = md5
; Update this path to match where you place userlist.txt on your system
; Windows example: auth_file = C:\pgbouncer\userlist.txt
; Linux example:   auth_file = /etc/pgbouncer/userlist.txt
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — safest mode for Django with CONN_MAX_AGE=0
; (session mode would work too but wastes connections)
pool_mode = transaction

default_pool_size = 20
max_client_conn = 100
reserve_pool_size = 5
reserve_pool_timeout = 3

; Keep connections alive
server_idle_timeout = 600
client_idle_timeout = 0

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Admin console
admin_users = postgres
