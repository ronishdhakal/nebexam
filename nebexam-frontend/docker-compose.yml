name: nebexam-frontend

x-frontend: &frontend-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  env_file: .env
  restart: unless-stopped
  networks:
    - nebexam-net
  healthcheck:
    test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:

  # ── Nginx (always running) ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    restart: always
    networks:
      - nebexam-net

  # ── Blue stack ─────────────────────────────────────────────────────────────
  frontend-blue:
    <<: *frontend-base
    container_name: nebexam-frontend-blue
    profiles: ["blue"]
    environment:
      INTERNAL_API_URL: http://nebexam-backend-blue:8000/api

  # ── Green stack ────────────────────────────────────────────────────────────
  frontend-green:
    <<: *frontend-base
    container_name: nebexam-frontend-green
    profiles: ["green"]
    environment:
      INTERNAL_API_URL: http://nebexam-backend-green:8000/api

networks:
  nebexam-net:
    external: true